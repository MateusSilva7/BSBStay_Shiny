services:
  - type: web
    name: bsbstay-shiny
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_MODE
        value: public
      - key: MAX_CACHE_AGE_H
        value: "6"
      - key: DRIVE_FILE_ID
        value: 1fnereY6JOrAbSl1yw_o_U94Fb0KTuHGJU85GEUrCBiU
      - key: DRIVE_FOLDER_ID
        value: 1753AZxwmyyWYS2oYQPLeMHIz5gM8bscb
      # ── Credenciais admin — ALTERE no painel do Render ──────
      # Nunca commite senhas reais aqui; use "generateValue: true"
      # ou defina manualmente no dashboard do Render.com
      - key: BSBSTAY_ADMIN_USER
        value: admin
      - key: BSBSTAY_ADMIN_PASS
        generateValue: true   # Render gera automaticamente; anote no primeiro deploy